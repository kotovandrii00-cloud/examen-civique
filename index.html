<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Examen Civique — Entraînement en ligne</title>
<style>
  :root{
    --bg1:#0A0A14; --bg2:#140D26; --bg3:#0A0F1F;
    --gold1:#C9A84D; --gold2:#E8C97A; --gold3:#A87829;
    --cream:#F2EBE0; --blue:#7A9CBC; --green:#6EE8AB; --red:#FCA3A3;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--cream); min-height:100vh;
    background:
      radial-gradient(1200px 800px at 80% -10%, rgba(201,168,77,.10), transparent 60%),
      linear-gradient(135deg,var(--bg1),var(--bg2) 55%,var(--bg3));
    background-attachment:fixed;
  }
  .serif{font-family:Georgia,"Times New Roman",serif;}
  .gold{background:linear-gradient(120deg,#F2EBE0,var(--gold1),var(--gold2));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .wrap{max-width:640px;margin:0 auto;padding:0 18px;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  .hidden{display:none !important;}

  /* lang bar */
  .langbar{display:flex;gap:6px;overflow-x:auto;padding:14px 64px 14px 18px;-ms-overflow-style:none;scrollbar-width:none;}
  .langbar::-webkit-scrollbar{display:none;}
  .lang-chip{white-space:nowrap;font-size:12px;font-weight:500;padding:7px 12px;border-radius:99px;
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:rgba(242,235,224,.45);}
  .lang-chip.active{background:rgba(201,168,77,.2);border-color:rgba(201,168,77,.5);color:var(--gold2);}

  /* HOME */
  .hero{text-align:center;padding:30px 0 18px;}
  .hero .eyebrow{font-size:11px;letter-spacing:4px;font-weight:700;color:rgba(201,168,77,.85);text-transform:uppercase;margin-bottom:14px;}
  .hero h1{font-size:40px;font-weight:900;line-height:1.06;margin-bottom:12px;}
  .hero p{color:rgba(242,235,224,.55);font-size:15px;line-height:1.5;max-width:440px;margin:0 auto;}
  .modes{display:flex;flex-direction:column;gap:12px;padding:24px 0;}
  .mode-card{display:flex;align-items:center;gap:16px;text-align:left;width:100%;
    background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:18px;
    transition:transform .12s ease,border-color .12s ease;}
  .mode-card:hover{transform:translateY(-2px);border-color:rgba(201,168,77,.4);}
  .mode-card .ico{font-size:30px;width:54px;height:54px;display:flex;align-items:center;justify-content:center;
    background:rgba(201,168,77,.1);border:1px solid rgba(201,168,77,.22);border-radius:14px;flex-shrink:0;}
  .mode-card .mt{font-size:18px;font-weight:800;}
  .mode-card .ms{font-size:13px;color:rgba(242,235,224,.5);margin-top:2px;}
  .mode-card .arr{margin-left:auto;color:var(--gold1);font-size:20px;}
  .home-info{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:16px 18px;margin-bottom:30px;}
  .home-info .row{display:flex;gap:9px;align-items:flex-start;font-size:13px;color:rgba(242,235,224,.6);padding:5px 0;}
  .home-info .row b{color:var(--gold1);}

  /* QUIZ */
  .qhead{display:flex;align-items:center;gap:10px;padding:10px 18px 6px;}
  .qquit{font-size:12px;color:rgba(255,255,255,.45);padding:7px 11px;border:1px solid rgba(255,255,255,.08);border-radius:10px;background:rgba(255,255,255,.05);}
  .qbar-wrap{flex:1;}
  .qbar{height:4px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden;}
  .qbar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold1),var(--gold2));transition:width .3s ease;}
  .qbar-meta{display:flex;justify-content:space-between;font-size:11px;margin-top:5px;color:rgba(255,255,255,.35);}
  .qbar-meta b{color:var(--gold1);}
  .qtimer{font-family:ui-monospace,Menlo,monospace;font-size:16px;font-weight:700;border:1px solid rgba(201,168,77,.3);border-radius:11px;padding:6px 10px;text-align:center;min-width:64px;}
  .qtimer span{display:block;font-size:7px;letter-spacing:1px;color:rgba(255,255,255,.3);}
  .cat{display:inline-block;font-size:9px;letter-spacing:2px;font-weight:700;color:var(--gold1);background:rgba(255,255,255,.05);
    border:1px solid rgba(201,168,77,.2);padding:5px 11px;border-radius:99px;text-transform:uppercase;margin-bottom:12px;}
  .cat.situ{color:#E8D14A;background:rgba(232,209,74,.08);border-color:rgba(232,209,74,.25);}
  .qcard{background:rgba(255,255,255,.032);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:18px;margin-bottom:14px;}
  .qtop{display:flex;align-items:flex-start;gap:10px;}
  .qfr{font-size:19px;font-weight:600;line-height:1.35;color:var(--cream);flex:1;}
  .qtr{font-size:14px;font-style:italic;color:var(--blue);margin-top:11px;padding-top:11px;border-top:1px solid rgba(255,255,255,.08);line-height:1.4;}
  .speak{flex-shrink:0;width:38px;height:38px;border-radius:11px;background:rgba(201,168,77,.12);border:1px solid rgba(201,168,77,.3);
    display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--gold2);transition:background .12s;}
  .speak:hover{background:rgba(201,168,77,.25);}
  .speak.playing{background:var(--gold2);color:#1a1306;}
  .speak.sm{width:30px;height:30px;font-size:14px;border-radius:9px;}
  .qtr-row{display:flex;align-items:flex-start;gap:9px;margin-top:11px;padding-top:11px;border-top:1px solid rgba(255,255,255,.08);}
  .qtr-row .qtr,.qtr-row .etr{flex:1;margin:0;padding:0;border:none;}

  /* PAYWALL */
  .pw{padding:30px 0 40px;text-align:center;}
  .pw .eyebrow{font-size:11px;letter-spacing:4px;font-weight:700;color:rgba(201,168,77,.55);text-transform:uppercase;margin-bottom:10px;}
  .pw h1{font-size:40px;font-weight:900;line-height:1.05;margin-bottom:12px;}
  .pw .sub{color:rgba(242,235,224,.5);font-size:15px;margin-bottom:24px;}
  .pw-feats{text-align:left;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:18px;margin-bottom:22px;}
  .pw-feats .f{display:flex;gap:10px;align-items:flex-start;font-size:14px;color:rgba(242,235,224,.62);padding:6px 0;}
  .pw-feats .f span{color:var(--gold1);flex-shrink:0;}
  .pw .price-note{font-size:12px;color:rgba(242,235,224,.35);margin-top:14px;line-height:1.5;}
  .pw-price{font-size:14px;color:var(--gold2);font-weight:700;margin-bottom:16px;}
  .pw-buy{display:flex;justify-content:center;margin-bottom:10px;min-height:48px;}

  /* INTRO — accueil type landing (texte + maquette téléphone) */
  .intro2{min-height:100dvh;display:flex;flex-direction:column;}
  .intro2-top{display:flex;gap:8px;align-items:center;padding:14px 66px 4px 20px;max-width:1120px;margin:0 auto;width:100%;}
  .intro2-langs{display:flex;gap:6px;overflow-x:auto;flex:1;scrollbar-width:none;}
  .intro2-langs::-webkit-scrollbar{display:none;}
  .intro2-skip{flex-shrink:0;font-size:12px;color:rgba(242,235,224,.45);padding:7px 11px;border:1px solid rgba(255,255,255,.08);border-radius:99px;background:rgba(255,255,255,.05);}
  .intro2-hero{flex:1;display:grid;grid-template-columns:1.05fr .95fr;gap:44px;align-items:center;max-width:1120px;margin:0 auto;width:100%;padding:18px 24px 44px;}
  .intro2-text .eyebrow{font-size:11px;letter-spacing:3.5px;font-weight:700;color:rgba(201,168,77,.85);text-transform:uppercase;margin-bottom:16px;}
  .intro2-text h1{font-size:clamp(34px,5vw,58px);font-weight:900;line-height:1.04;letter-spacing:-1px;margin:0 0 18px;}
  .intro2-text .lead{font-size:clamp(15px,1.5vw,18px);line-height:1.55;color:rgba(242,235,224,.6);max-width:520px;margin:0 0 26px;}
  .intro2-cta{max-width:340px;margin-bottom:12px;}
  .intro2-offer{font-size:13.5px;color:rgba(242,235,224,.55);margin:0 0 22px;line-height:1.45;}
  .intro2-offer b{color:var(--gold2);font-weight:700;}
  .stats2{display:flex;gap:30px;flex-wrap:wrap;margin-bottom:26px;}
  .stats2 .s .n{font-size:26px;font-weight:800;line-height:1;}
  .stats2 .s .l{font-size:12px;color:rgba(242,235,224,.45);margin-top:3px;}
  .intro2 .badges{justify-content:flex-start;}
  .intro2-phone{display:flex;justify-content:center;perspective:1700px;}
  .intro2-phone .pm-phone{transform:rotateY(-18deg) rotateX(4deg) rotateZ(1.5deg);transform-style:preserve-3d;
    box-shadow:-30px 40px 90px rgba(0,0,0,.65),0 0 0 1px rgba(255,255,255,.05);transition:transform .5s ease;}
  .intro2-phone .pm-phone:hover{transform:rotateY(-6deg) rotateX(2deg);}
  /* maquette téléphone */
  .pm-phone{width:300px;border-radius:44px;padding:12px;background:linear-gradient(160deg,#23232e,#0c0c12);box-shadow:0 40px 90px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.05);position:relative;}
  .pm-notch{position:absolute;top:20px;left:50%;transform:translateX(-50%);width:108px;height:24px;background:#000;border-radius:99px;z-index:3;}
  .pm-screen{border-radius:32px;overflow:hidden;height:662px;background:linear-gradient(160deg,#0b0a15,#100f1d 60%,#0a0d1a);padding:11px 13px 0;}
  .hm-status{display:flex;align-items:center;justify-content:space-between;font-size:10px;font-weight:600;color:rgba(255,255,255,.85);padding:2px 4px 0;}
  .hm-status .r{display:flex;align-items:center;gap:4px;font-size:9px;letter-spacing:.5px;}
  .hm-flag{display:flex;gap:4px;justify-content:center;margin:9px 0 4px;}
  .hm-flag i{width:15px;height:3px;border-radius:2px;display:block;}
  .hm-eyebrow{text-align:center;font-size:7px;letter-spacing:2.5px;font-weight:700;color:rgba(242,235,224,.4);text-transform:uppercase;}
  .hm-title{text-align:center;font-family:Georgia,serif;font-weight:900;font-size:25px;line-height:1.0;margin:3px 0;
    background:linear-gradient(120deg,#F2EBE0,var(--gold1),var(--gold2));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .hm-sub{text-align:center;font-style:italic;font-size:10px;color:rgba(242,235,224,.4);margin-bottom:9px;}
  .hm-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:9px;}
  .hm-stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:7px 2px;text-align:center;}
  .hm-stat .e{font-size:13px;}
  .hm-stat .n{font-size:12px;font-weight:800;color:var(--gold2);margin-top:1px;}
  .hm-stat .l{font-size:6px;color:rgba(242,235,224,.45);margin-top:1px;letter-spacing:.2px;}
  .hm-prog{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:9px 10px;margin-bottom:9px;}
  .hm-prog .h{font-size:6.5px;letter-spacing:2px;color:rgba(242,235,224,.4);font-weight:700;text-transform:uppercase;margin-bottom:7px;}
  .hm-prog .row{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
  .hm-prog .c{text-align:center;}
  .hm-prog .c .e{font-size:12px;}
  .hm-prog .c .n{font-size:12px;font-weight:800;color:var(--gold2);}
  .hm-prog .c .l{font-size:6.5px;color:rgba(242,235,224,.45);}
  .hm-prog .revoir{font-size:7.5px;color:rgba(242,235,224,.5);margin-top:7px;padding-top:7px;border-top:1px solid rgba(255,255,255,.06);}
  .hm-label{font-size:6.5px;letter-spacing:2px;color:rgba(242,235,224,.4);font-weight:700;text-transform:uppercase;margin:4px 0 5px;}
  .hm-modes{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
  .hm-mode{border-radius:11px;padding:9px 3px;text-align:center;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);}
  .hm-mode .e{font-size:14px;}
  .hm-mode .t{font-size:10px;font-weight:800;margin-top:1px;color:var(--cream);}
  .hm-mode.active{background:linear-gradient(135deg,var(--gold3),var(--gold2));border-color:transparent;}
  .hm-mode.active .t{color:#1a1306;}
  .hm-modecap{font-style:italic;font-size:8px;color:rgba(242,235,224,.4);margin:5px 0 9px;}
  .hm-langs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px;}
  .hm-lang{font-size:8.5px;padding:5px 8px;border-radius:99px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(242,235,224,.5);}
  .hm-lang.active{background:rgba(201,168,77,.18);border-color:rgba(201,168,77,.5);color:var(--gold2);}
  .hm-format{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:9px 10px;margin-bottom:9px;}
  .hm-format .h{font-size:6.5px;letter-spacing:2px;color:var(--gold1);font-weight:700;text-transform:uppercase;margin-bottom:6px;}
  .hm-format .b{font-size:7.5px;color:rgba(242,235,224,.55);line-height:1.5;display:flex;gap:5px;margin-top:3px;}
  .hm-format .b i{color:var(--gold1);font-style:normal;}
  .hm-start{text-align:center;font-family:Georgia,serif;font-size:12px;font-weight:800;letter-spacing:1px;color:#1a1306;
    padding:12px;border-radius:12px;background:linear-gradient(90deg,var(--gold3),var(--gold2),var(--gold1));box-shadow:0 8px 20px rgba(201,168,77,.3);margin-bottom:8px;}
  .hm-search{display:flex;align-items:center;justify-content:space-between;font-size:9px;color:rgba(242,235,224,.4);
    padding:10px 13px;border-radius:99px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);}
  .dl-title{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:rgba(242,235,224,.4);font-weight:700;margin:6px 0 10px;}

  /* STORE BADGES */
  .badges{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  .store-badge{display:flex;align-items:center;gap:11px;text-decoration:none;padding:10px 18px;border-radius:13px;
    background:#000;border:1px solid rgba(255,255,255,.16);transition:transform .14s ease,border-color .14s ease;min-width:176px;}
  .store-badge:hover{transform:translateY(-2px);border-color:rgba(201,168,77,.55);}
  .store-badge .txt{display:flex;flex-direction:column;line-height:1.15;text-align:left;}
  .store-badge .small{font-size:9.5px;color:#cfcfcf;letter-spacing:.3px;}
  .store-badge .big{font-size:17px;font-weight:600;color:#fff;}
  .badges-note{font-size:11px;color:rgba(242,235,224,.3);margin-top:12px;}
  .home-dl{margin:26px 0 6px;text-align:center;}
  /* téléphone / tablette : une seule colonne, maquette masquée */
  @media (max-width:860px){
    .intro2-hero{grid-template-columns:1fr;gap:24px;text-align:center;padding:14px 22px 40px;align-content:center;}
    .intro2-text .lead{margin-left:auto;margin-right:auto;}
    .intro2-cta{margin-left:auto;margin-right:auto;}
    .intro2 .badges{justify-content:center;}
    .stats2{justify-content:center;gap:22px;}
    .intro2-phone{display:none;}
  }
  .opts{display:flex;flex-direction:column;gap:9px;margin-bottom:14px;}
  .opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:13px 14px;border-radius:13px;font-size:14px;line-height:1.4;
    border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.04);color:rgba(217,210,200,.85);transition:all .18s ease;}
  .opt .lbl{width:26px;height:26px;flex-shrink:0;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
    background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.1);}
  .opt.correct{background:rgba(110,232,171,.1);border-color:rgba(110,232,171,.5);color:var(--green);}
  .opt.correct .lbl{background:rgba(110,232,171,.2);border-color:rgba(110,232,171,.5);color:var(--green);}
  .opt.wrong{background:rgba(252,163,163,.1);border-color:rgba(252,163,163,.45);color:var(--red);}
  .opt.wrong .lbl{background:rgba(252,163,163,.2);border-color:rgba(252,163,163,.45);color:var(--red);}
  .opt.faded{opacity:.4;}
  .opt:disabled{cursor:default;}
  .expl{border-radius:14px;padding:16px;margin-bottom:14px;}
  .expl.good{background:rgba(110,232,171,.07);border:1px solid rgba(110,232,171,.2);}
  .expl.bad{background:rgba(122,156,188,.07);border:1px solid rgba(122,156,188,.2);}
  .expl .eh{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:9px;display:flex;gap:7px;align-items:center;}
  .expl.good .eh{color:rgba(110,232,171,.9);}
  .expl.bad .eh{color:var(--blue);}
  .expl .etext{font-size:13px;line-height:1.5;color:rgba(217,210,200,.85);}
  .expl .etr{font-size:13px;font-style:italic;color:var(--blue);margin-top:9px;padding-top:9px;border-top:1px solid rgba(255,255,255,.08);line-height:1.5;}
  .btn-primary{width:100%;text-align:center;font-size:16px;font-weight:800;color:#1a1306;padding:16px;border-radius:14px;
    background:linear-gradient(90deg,var(--gold1),var(--gold2));box-shadow:0 8px 20px rgba(201,168,77,.3);}
  .pad{padding:0 18px 40px;}
  .qlangrow{display:flex;gap:6px;overflow-x:auto;padding:6px 18px 12px;scrollbar-width:none;}
  .qlangrow::-webkit-scrollbar{display:none;}

  /* RESULT */
  .result{text-align:center;padding:40px 0 20px;}
  .rscore{font-size:78px;font-weight:900;line-height:1;}
  .rverdict{font-size:22px;font-weight:800;margin:10px 0 4px;}
  .rverdict.pass{color:var(--green);}
  .rverdict.fail{color:var(--red);}
  .rsub{color:rgba(242,235,224,.5);font-size:14px;margin-bottom:24px;}
  .rstats{display:flex;gap:10px;margin-bottom:26px;}
  .rstat{flex:1;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px;}
  .rstat .n{font-size:24px;font-weight:800;}
  .rstat .l{font-size:11px;color:rgba(242,235,224,.45);margin-top:2px;}
  .review-h{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:rgba(242,235,224,.4);text-align:left;margin:8px 0 12px;font-weight:700;}
  .rev{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:14px;margin-bottom:10px;text-align:left;}
  .rev .rq{font-size:14px;font-weight:600;margin-bottom:8px;}
  .rev .ra{font-size:12.5px;padding:3px 0;}
  .rev .ra.ok{color:var(--green);}
  .rev .ra.no{color:var(--red);}
  .ghost{width:100%;text-align:center;font-size:14px;color:rgba(242,235,224,.5);padding:13px;margin-top:8px;}

  /* LEARNING */
  .topic{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:rgba(255,255,255,.035);
    border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px;margin-bottom:11px;transition:transform .12s,border-color .12s;}
  .topic:hover{transform:translateY(-2px);border-color:rgba(201,168,77,.4);}
  .topic .tt{font-size:16px;font-weight:700;}
  .topic .ts{font-size:12.5px;color:rgba(242,235,224,.5);margin-top:3px;line-height:1.4;}
  .topic .arr{margin-left:auto;color:var(--gold1);font-size:18px;}
  .section{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:18px;margin-bottom:14px;}
  .section .sh{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .section .st{font-size:17px;font-weight:700;flex:1;}
  .section .sx{font-size:14px;line-height:1.6;color:rgba(217,210,200,.82);white-space:pre-wrap;}
  .backlink{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--gold1);padding:14px 18px;}

  /* ACCOUNT BUTTON (coin haut-droit) */
  #acct{position:fixed;top:14px;right:14px;z-index:120;}
  .acct-btn{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;
    color:var(--gold2);background:rgba(20,16,32,.7);border:1px solid rgba(201,168,77,.4);backdrop-filter:blur(8px);
    box-shadow:0 6px 18px rgba(0,0,0,.4);transition:transform .12s,border-color .12s;}
  .acct-btn:hover{transform:translateY(-1px);border-color:var(--gold2);}

  /* AUTH SCREEN */

  .auth .btn-primary{margin-top:6px;}

  /* flash toast */

  /* FOOTER */

<script>

const LANGS = [

// ---- i18n for UI chrome ----
const T = {

  good_n:{fr:"correctes",ru:"верных",uk:"правильних",ar:"صحيحة",tr:"doğru",pt:"corretas",en:"correct"},
  bad_n:{fr:"erreurs",ru:"ошибок",uk:"помилок",ar:"أخطاء",tr:"hata",pt:"erros",en:"errors"},
  total_n:{fr:"questions",ru:"вопросов",uk:"питань",ar:"أسئلة",tr:"soru",pt:"perguntas",en:"questions"},
  retry:{fr:"Recommencer",ru:"Заново",uk:"Спочатку",ar:"إعادة",tr:"Tekrar",pt:"Recomeçar",en:"Restart"},
  home:{fr:"Accueil",ru:"На главную",uk:"На головну",ar:"الرئيسية",tr:"Ana sayfa",pt:"Início",en:"Home"},
  review:{fr:"Vos erreurs",ru:"Ваши ошибки",uk:"Ваші помилки",ar:"أخطاؤك",tr:"Hatalarınız",pt:"Seus erros",en:"Your mistakes"},
  yourAns:{fr:"Votre réponse",ru:"Ваш ответ",uk:"Ваша відповідь",ar:"إجابتك",tr:"Cevabınız",pt:"Sua resposta",en:"Your answer"},
  goodAns:{fr:"Bonne réponse",ru:"Правильный ответ",uk:"Правильна відповідь",ar:"الإجابة الصحيحة",tr:"Doğru cevap",pt:"Resposta correta",en:"Correct answer"},
  back:{fr:"Retour",ru:"Назад",uk:"Назад",ar:"رجوع",tr:"Geri",pt:"Voltar",en:"Back"},
  best:{fr:"Meilleur",ru:"Лучший",uk:"Найкращий",ar:"الأفضل",tr:"En iyi",pt:"Melhor",en:"Best"},
  average:{fr:"Moyenne",ru:"Среднее",uk:"Середній",ar:"المتوسط",tr:"Ortalama",pt:"Média",en:"Average"},
  tests:{fr:"Tests",ru:"Тестов",uk:"Тестів",ar:"اختبارات",tr:"Test",pt:"Testes",en:"Tests"},
  myProgress:{fr:"Ma progression",ru:"Мой прогресс",uk:"Мій прогрес",ar:"تقدمي",tr:"İlerlemem",pt:"Meu progresso",en:"My progress"},
};
function t(key){ return (T[key] && (T[key][state.lang]||T[key].fr)) || ''; }

// ---- modes meta ----
const MODES = {
  csp:{icon:'📋',title:{fr:'CSP',ru:'CSP',uk:'CSP',ar:'CSP',tr:'CSP',pt:'CSP',en:'CSP'},
    sub:{fr:'Carte de séjour pluriannuelle',ru:'Многолетний вид на жительство',uk:'Багаторічна посвідка',ar:'بطاقة إقامة متعددة السنوات',tr:'Çok yıllı oturum kartı',pt:'Autorização plurianual',en:'Multi-year residence permit'}},
  cr:{icon:'🏅',title:{fr:'CR',ru:'CR',uk:'CR',ar:'CR',tr:'CR',pt:'CR',en:'CR'},
    sub:{fr:'Carte de résident 10 ans',ru:'Карта резидента на 10 лет',uk:'Карта резидента на 10 років',ar:'بطاقة مقيم 10 سنوات',tr:'10 yıllık ikamet kartı',pt:'Cartão de residente 10 anos',en:'10-year resident card'}},
  learning:{icon:'📖',title:{fr:'Étude',ru:'Обучение',uk:'Навчання',ar:'الدراسة',tr:'Eğitim',pt:'Estudo',en:'Study'},
    sub:{fr:'Cours officiels par thème',ru:'Официальные уроки по темам',uk:'Офіційні уроки за темами',ar:'دروس رسمية حسب الموضوع',tr:'Konuya göre resmi dersler',pt:'Aulas oficiais por tema',en:'Official lessons by topic'}},
};

// ============================================================
//  CONFIGURATION — édite ces 2 lignes
// ============================================================
const FREE_LIMIT = 15;                 // questions gratuites par session
const PRICE_LABEL = "2,99 €";          // prix affiché sur le paywall
// Mode TEST automatique sur localhost (Payment Link de test), boutons live en prod
const ON_LOCALHOST = (location.hostname === 'localhost' || location.hostname === '127.0.0.1');
const STRIPE_PAYMENT_LINK_TEST = "https://buy.stripe.com/test_4gMdR8gOWcCValc1Ds0RG00";
const STRIPE_PAYMENT_LINK = ON_LOCALHOST ? STRIPE_PAYMENT_LINK_TEST : "";
// Customer Portal (gérer / résilier l'abonnement)
const STRIPE_PORTAL_LINK_TEST = "https://billing.stripe.com/p/login/test_4gMdR8gOWcCValc1Ds0RG00";
const STRIPE_PORTAL_LINK_LIVE = "https://billing.stripe.com/p/login/4gMdR8gOWcCValc1Ds0RG00";
const STRIPE_PORTAL_LINK = ON_LOCALHOST ? STRIPE_PORTAL_LINK_TEST : STRIPE_PORTAL_LINK_LIVE;
const APP_STORE_URL   = "";            // ← lien App Store (https://apps.apple.com/app/idXXXXXXXX)
const GOOGLE_PLAY_URL = "";            // ← lien Google Play (https://play.google.com/store/apps/details?id=com.examencivique.app)
// --- Stripe Buy Button (clé publishable = publique, OK dans le code) ---
const STRIPE_BUY_BUTTON_ID  = "buy_btn_1Tl7G7C076I4JphPCsKmEk5I";
const STRIPE_PUBLISHABLE_KEY = "pk_live_51TjFcYC076I4JphPz9rcs3LX1meO1KjK8JbN2gvONYMHYr7x7umDnhnN95NvFHUS1HDiF06cjG37ymLPJtKsT6cO00KnZjrcNd";
// --- Appwrite (compte + vérification d'accès) ---
const APPWRITE_ENDPOINT = "https://fra.cloud.appwrite.io/v1";
const APPWRITE_PROJECT  = "6a340050002044004a45";
const APPWRITE_DB       = "main";
const APPWRITE_COL      = "subscriptions";
// ============================================================

// ---- persistence (localStorage) ----
const LS = { access:'examen_fullaccess', stats:'examen_stats', lang:'examen_lang' };
const DEFAULT_STATS = { completedTests:0, bestScorePercent:0, lastScorePercent:0, totalAnswered:0, totalCorrect:0 };
function loadAccess(){ try{ return localStorage.getItem(LS.access)==='1'; }catch(e){ return false; } }
function grantAccess(){ try{ localStorage.setItem(LS.access,'1'); }catch(e){} state.fullAccess=true; }
function loadStats(){ try{ return Object.assign({}, DEFAULT_STATS, JSON.parse(localStorage.getItem(LS.stats))||{}); }catch(e){ return Object.assign({}, DEFAULT_STATS); } }
function saveStats(){ try{ localStorage.setItem(LS.stats, JSON.stringify(state.stats)); }catch(e){} }
function loadLang(){ try{ return localStorage.getItem(LS.lang)||'fr'; }catch(e){ return 'fr'; } }
function avgPercent(){ return state.stats.totalAnswered>0 ? Math.round(state.stats.totalCorrect/state.stats.totalAnswered*100) : 0; }

// ---- state ----
const state = {
  view:'home', lang:'fr', mode:'csp',
  session:[], idx:0, score:0, answers:[], selected:null, showExpl:false,
  timeLeft:45*60, timer:null, topic:null,
  fullAccess:false, stats:Object.assign({}, DEFAULT_STATS),
  user:null, sub:null, authMode:'login', authBusy:false, authMsg:'', authInfo:'', acctOpen:false,
  recovery:null, flash:'', legalTab:'cgv',
};

// ---- Appwrite client ----
const aw = { client:null, account:null, db:null, ready:false };
function awInit(){
  if(aw.ready) return true;
  if(!window.Appwrite){ return false; }
  try{
    aw.client = new Appwrite.Client().setEndpoint(APPWRITE_ENDPOINT).setProject(APPWRITE_PROJECT);
    aw.account = new Appwrite.Account(aw.client);
    aw.db = new Appwrite.Databases(aw.client);
    aw.ready = true;
  }catch(e){ return false; }
  return true;
}
function verifyUrl(){ return location.origin + location.pathname + '?verify=1'; }
function recoveryUrl(){ return location.origin + location.pathname + '?recovery=1'; }
// accès = abonnement actif (à vie: pas de date; abonnement: date future)
function subActive(){
  const s=state.sub; if(!s||s.status!=='active') return false;
  if(s.currentPeriodEnd){ return new Date(s.currentPeriodEnd).getTime() > Date.now(); }
  return true;
}
function refreshAccess(){ state.fullAccess = subActive() || loadAccess(); }
async function awLoadUser(){
  if(!awInit()) return;
  try{ state.user = await aw.account.get(); }catch(e){ state.user=null; }
  await awLoadSub();
}
async function awLoadSub(){
  state.sub=null;
  if(state.user){
    try{ state.sub = await aw.db.getDocument(APPWRITE_DB, APPWRITE_COL, state.user.$id); }
    catch(e){ state.sub=null; }
  }
  refreshAccess();
}
async function awLogout(){
  try{ await aw.account.deleteSession('current'); }catch(e){}
  state.user=null; state.sub=null; refreshAccess(); render();
}

function ml(obj){ return obj[state.lang]||obj.fr; }
function curLang(){ return LANGS.find(l=>l.id===state.lang)||LANGS[0]; }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ---- translation lookup (mirrors the iOS app) ----
function trans(q){
  if(state.lang==='fr') return {question:q.question, options:{}, explanation:q.explanation};
  const d = D.translations[state.lang] && D.translations[state.lang][q.question];
  if(d) return d;
  return {question:q.question, options:{}, explanation:q.explanation};
}
function optText(q,fr){
  if(state.lang==='fr') return fr;
  const d = D.translations[state.lang] && D.translations[state.lang][q.question];
  return (d && d.options[fr]) || fr;
}

// ---- TTS ----
let voices=[];
function loadVoices(){ voices = window.speechSynthesis ? speechSynthesis.getVoices() : []; }
if(window.speechSynthesis){ loadVoices(); speechSynthesis.onvoiceschanged = loadVoices; }
let speakingEl=null;
function speak(text, loc, el){
  if(!window.speechSynthesis || !text) return;
  // n'annule que si quelque chose est en cours (évite la course cancel→speak)
  if(speechSynthesis.speaking || speechSynthesis.pending) speechSynthesis.cancel();
  if(speakingEl){ speakingEl.classList.remove('playing'); }
  if(!voices.length) loadVoices();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = loc; u.rate = 0.92;
  const v = voices.find(v=>v.lang===loc) || voices.find(v=>v.lang.slice(0,2)===loc.slice(0,2));
  if(v) u.voice=v;
  if(el){ el.classList.add('playing'); speakingEl=el; u.onend=u.onerror=()=>el.classList.remove('playing'); }
  // appel direct dans le geste utilisateur (requis par Safari)
  speechSynthesis.speak(u);
}
// Lecteurs dédiés (évitent d'injecter le texte dans onclick)
function ttsFR(el){ const q=state.session[state.idx]; if(q) speak(q.question,'fr-FR',el); }
function ttsTransQ(el){ const q=state.session[state.idx]; if(q){ const d=trans(q); speak(d.question, curLang().loc, el); } }
function ttsTransExpl(el){ const q=state.session[state.idx]; if(q){ const d=trans(q); speak(d.explanation, curLang().loc, el); } }
function ttsSection(i, el){ const s=D.learning[state.topic] && D.learning[state.topic].sections[i]; if(s) speak(ml(s.title)+'. '+ml(s.text), curLang().loc, el); }

// =================== VIEWS ===================
const app = document.getElementById('app');
function render(){
  if(state.view==='intro') renderIntro();
  else if(state.view==='home') renderHome();
  else if(state.view==='quiz') renderQuiz();
  else if(state.view==='result') renderResult();
  else if(state.view==='learnList') renderLearnList();
  else if(state.view==='learnTopic') renderLearnTopic();
  else if(state.view==='auth') renderAuth();
  else if(state.view==='forgot') renderForgot();
  else if(state.view==='reset') renderReset();
  else if(state.view==='paywall') renderPaywall();
  else if(state.view==='legal') renderLegal();
  updateAcct();
  window.scrollTo(0,0);
}
// ---------- bouton compte (coin haut-droit) ----------
function updateAcct(){
  const el=document.getElementById('acct'); if(!el) return;
  if(state.view==='auth' || state.view==='forgot' || state.view==='reset' || state.view==='quiz'){ el.innerHTML=''; return; }
  const logged=!!state.user;
  const verified=logged && state.user.emailVerification;
  const initial=logged ? (state.user.email||'?').charAt(0).toUpperCase() : '';
  el.innerHTML = `<button class="acct-btn ${logged?'on':''}" onclick="acctClick()" title="${logged?esc(state.user.email):esc(ml(AUTH.login))}">
      ${logged ? `<span class="acct-ini">${esc(initial)}</span>${verified?'<span class="acct-ok">✓</span>':''}`
               : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>`}
    </button>
    ${state.acctOpen && logged ? acctMenu() : ''}`;
}
function acctMenu(){
  const verified=state.user.emailVerification;
  return `<div class="acct-menu">
    <div class="acct-email">${esc(state.user.email)}</div>
    <div class="acct-status ${verified?'ok':'warn'}">${verified
      ? '✓ '+esc(ml({fr:'Email vérifié',ru:'Email подтверждён',uk:'Email підтверджено',ar:'تم تأكيد البريد',tr:'E-posta doğrulandı',pt:'Email verificado',en:'Email verified'}))
      : '⚠ '+esc(ml({fr:'Email non vérifié',ru:'Email не подтверждён',uk:'Email не підтверджено',ar:'البريد غير مؤكد',tr:'E-posta doğrulanmadı',pt:'Email não verificado',en:'Email not verified'}))}</div>

// ---------- QUIZ ----------
function startQuiz(mode){
  state.mode=mode;
  const pool=D.pools[mode];
  const knowledge=shuffle(pool.knowledge).slice(0,28);
  const situ=shuffle(pool.situational).slice(0,12);
  state.session=shuffle(knowledge.concat(situ)).map(q=>({...q,_opts:shuffle(q.options)}));
  state.idx=0; state.score=0; state.answers=[]; state.selected=null; state.showExpl=false;
  state.timeLeft=45*60; state.view='quiz';
  startTimer();
  render();
}
function startTimer(){
  clearInterval(state.timer);
  state.timer=setInterval(()=>{
    state.timeLeft--;
    if(state.timeLeft<=0){ finish(); return; }
    const el=document.getElementById('timer'); if(el) el.firstChild.textContent=fmtTime();
  },1000);
}
function fmtTime(){ const m=Math.floor(state.timeLeft/60),s=state.timeLeft%60; return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'); }
function timerColor(){ if(state.timeLeft<300)return 'var(--red)'; if(state.timeLeft<600)return '#E8D14A'; return 'var(--gold1)'; }

function renderQuiz(){
  // Paywall: 15 questions gratuites, puis accès complet (comme l'app iOS)
  if(!state.fullAccess && state.answers.length>=FREE_LIMIT){ renderPaywall(); return; }
  const q=state.session[state.idx];
  const tq=trans(q);
  const isFr=state.lang==='fr';
  const isSitu=q.category && q.category.toLowerCase().indexOf('situation')>=0;
  const rtl = state.lang==='ar';
  const progress=(state.idx/state.session.length)*100;

  let optsHtml=q._opts.map((opt,i)=>{
    let cls='opt';
    if(state.selected!==null){
      if(opt===q.correctAnswer) cls+=' correct';
      else if(opt===state.selected) cls+=' wrong';
      else cls+=' faded';
    }
    const lbl=(state.selected!==null)?(opt===q.correctAnswer?'✓':(opt===state.selected?'✗':['A','B','C','D'][i])):['A','B','C','D'][i];
    return `<button class="${cls}" ${state.selected!==null?'disabled':''} onclick="answer(${i})">
      <span class="lbl">${lbl}</span><span ${rtl?'dir="rtl"':''}>${esc(optText(q,opt))}</span></button>`;
  }).join('');

  let explHtml='';
  if(state.showExpl){
    const isCorrect=state.selected===q.correctAnswer;
    explHtml=`<div class="expl ${isCorrect?'good':'bad'}">
      <div class="eh">${isCorrect?'✅ '+esc(t('good')):'💡 '+esc(t('expl'))}</div>
      <div class="etext">${esc(q.explanation)}</div>
      ${(!isFr && tq.explanation && tq.explanation!==q.explanation)?`<div class="qtr-row"><div class="etr" ${rtl?'dir="rtl"':''}>${esc(tq.explanation)}</div><button class="speak sm" title="${esc(curLang().name)}" onclick="ttsTransExpl(this)">🔊</button></div>`:''}
    </div>
    <button class="btn-primary" onclick="next()">${state.idx+1>=state.session.length?esc(t('seeResults')):esc(t('next'))} →</button>`;
  }

  app.innerHTML = `
    <div class="qhead">
      <button class="qquit" onclick="finish()">✕ ${esc(t('quit'))}</button>
      <div class="qbar-wrap">
        <div class="qbar"><i style="width:${progress}%"></i></div>
        <div class="qbar-meta"><span>${esc(t('question'))} ${state.idx+1} / ${state.session.length}</span><b>${state.score} ${esc(t('correct'))}</b></div>
      </div>
      <div class="qtimer" id="timer" style="color:${timerColor()};border-color:${timerColor()}55">${fmtTime()}<span>${esc(t('remaining'))}</span></div>
    </div>
    ${qLangRow()}
    <div class="pad">
      <span class="cat ${isSitu?'situ':''}">${isSitu?'💡 ':''}${esc(q.category)}</span>
      <div class="qcard">
        <div class="qtop">
          <div class="qfr">${esc(q.question)}</div>
          <button class="speak" title="Écouter (FR)" onclick="ttsFR(this)">🔊</button>
        </div>
        ${(!isFr && tq.question && tq.question!==q.question)?`<div class="qtr-row"><div class="qtr" ${rtl?'dir="rtl"':''}>${esc(tq.question)}</div><button class="speak sm" title="${esc(curLang().name)}" onclick="ttsTransQ(this)">🔊</button></div>`:''}
      </div>
      <div class="opts">${optsHtml}</div>
      ${explHtml}
    </div>`;
}

  const email=(document.getElementById('auth-email')||{}).value||'';
  const pass=(document.getElementById('auth-pass')||{}).value||'';
  if(!email||!pass){ state.authMsg=ml({fr:"Remplissez email et mot de passe.",ru:"Введите email и пароль.",uk:"Введіть email і пароль.",ar:"أدخل البريد وكلمة المرور.",tr:"Email ve şifre girin.",pt:"Preencha email e senha.",en:"Enter email and password."}); render(); return; }
  state.authBusy=true; state.authMsg=''; render();
  try{
    if(state.authMode==='register'){
      await aw.account.create(Appwrite.ID.unique(), email, pass);
      await aw.account.createEmailPasswordSession(email, pass);
      try{ await aw.account.createVerification(verifyUrl()); }catch(e){}
      await awLoadUser();
      state.authBusy=false;
      goHome();
      showFlash(ml(AUTH.checkEmail));
    } else {
      await aw.account.createEmailPasswordSession(email, pass);
      await awLoadUser();
      state.authBusy=false;
      goHome();
    }
  }catch(e){ state.authBusy=false; state.authMsg=authErr(e); render(); }
}
async function resendVerification(){
  if(!state.user) return;
  try{ await aw.account.createVerification(verifyUrl()); alert(ml({fr:"Email de vérification renvoyé.",ru:"Письмо подтверждения отправлено повторно.",uk:"Лист підтвердження надіслано повторно.",ar:"تمت إعادة إرسال بريد التحقق.",tr:"Doğrulama e-postası tekrar gönderildi.",pt:"Email de verificação reenviado.",en:"Verification email resent."})); }
  catch(e){ alert(authErr(e)); }
}

function renderAuth(){
  const isReg=state.authMode==='register';
  app.innerHTML = `<button class="backlink" onclick="goHome()">← ${esc(ml(AUTH.back))}</button>
  <div class="wrap"><div class="auth">
    <h1 class="serif gold">${esc(ml(isReg?AUTH.register:AUTH.login))}</h1>
    ${state.authInfo?`<div class="auth-info">${esc(state.authInfo)}</div>`:''}
    <div class="auth-field"><label>${esc(ml(AUTH.email))}</label><input id="auth-email" type="email" autocomplete="email" inputmode="email" placeholder="vous@email.com"></div>
    <div class="auth-field"><label>${esc(ml(AUTH.pass))}</label><input id="auth-pass" type="password" autocomplete="${isReg?'new-password':'current-password'}" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAuth()"></div>
    ${state.authMsg?`<div class="auth-err">${esc(state.authMsg)}</div>`:''}
    <button class="btn-primary" ${state.authBusy?'disabled':''} onclick="doAuth()">${state.authBusy?'…':esc(ml(isReg?AUTH.register:AUTH.login))}</button>
    ${!isReg?`<button class="auth-link" onclick="openForgot()">${esc(ml(AUTH.forgot))}</button>`:''}
    <button class="ghost" onclick="setAuthMode('${isReg?'login':'register'}')">${esc(ml(isReg?AUTH.haveAcc:AUTH.noAcc))}</button>
  </div></div>`;
  setTimeout(()=>{ const el=document.getElementById('auth-email'); if(el) el.focus(); },30);
}
// ---- mot de passe oublié ----
function openForgot(){ state.authMsg=''; state.authInfo=''; state.authBusy=false; state.view='forgot'; render(); }
function renderForgot(){
  app.innerHTML = `<button class="backlink" onclick="openAuth('login')">← ${esc(ml(AUTH.back))}</button>
  <div class="wrap"><div class="auth">
    <h1 class="serif gold">${esc(ml(AUTH.forgotTitle))}</h1>
    <div class="auth-sub">${esc(ml(AUTH.forgotSub))}</div>
    ${state.authInfo?`<div class="auth-info">${esc(state.authInfo)}</div>`:''}
    <div class="auth-field"><label>${esc(ml(AUTH.email))}</label><input id="auth-email" type="email" autocomplete="email" inputmode="email" placeholder="vous@email.com" onkeydown="if(event.key==='Enter')doForgot()"></div>
    ${state.authMsg?`<div class="auth-err">${esc(state.authMsg)}</div>`:''}
    <button class="btn-primary" ${state.authBusy?'disabled':''} onclick="doForgot()">${state.authBusy?'…':esc(ml(AUTH.send))}</button>
    <button class="ghost" onclick="openAuth('login')">${esc(ml(AUTH.login))}</button>
  </div></div>`;
  setTimeout(()=>{ const el=document.getElementById('auth-email'); if(el) el.focus(); },30);
}
async function doForgot(){
  if(state.authBusy) return;
  if(!awInit()){ state.authMsg="SDK Appwrite non chargé."; render(); return; }
  const email=(document.getElementById('auth-email')||{}).value||'';
  if(!email){ state.authMsg=ml(AUTH.email); render(); return; }
  state.authBusy=true; state.authMsg=''; render();
  try{
    await aw.account.createRecovery(email, recoveryUrl());
  }catch(e){ /* on ne révèle pas si l'email existe */ }
  state.authBusy=false; state.authInfo=ml(AUTH.forgotSent); render();
}
// ---- nouveau mot de passe (depuis le lien email) ----
function renderReset(){
  app.innerHTML = `<button class="backlink" onclick="openAuth('login')">← ${esc(ml(AUTH.back))}</button>
  <div class="wrap"><div class="auth">
    <h1 class="serif gold">${esc(ml(AUTH.resetTitle))}</h1>
    ${state.authInfo?`<div class="auth-info">${esc(state.authInfo)}</div>`:''}
    <div class="auth-field"><label>${esc(ml(AUTH.newPass))}</label><input id="rp1" type="password" autocomplete="new-password" placeholder="••••••••"></div>
    <div class="auth-field"><label>${esc(ml(AUTH.confirm))}</label><input id="rp2" type="password" autocomplete="new-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doReset()"></div>
    ${state.authMsg?`<div class="auth-err">${esc(state.authMsg)}</div>`:''}
    <button class="btn-primary" ${state.authBusy?'disabled':''} onclick="doReset()">${state.authBusy?'…':esc(ml(AUTH.save))}</button>
  </div></div>`;
}
async function doReset(){
  if(state.authBusy) return;
  if(!awInit()||!state.recovery){ state.authMsg=ml(AUTH.back); render(); return; }
  const p1=(document.getElementById('rp1')||{}).value||'';
  const p2=(document.getElementById('rp2')||{}).value||'';
  if(p1.length<8){ state.authMsg=ml({fr:"Mot de passe : 8 caractères minimum.",ru:"Пароль: минимум 8 символов.",uk:"Пароль: мінімум 8 символів.",ar:"كلمة المرور: 8 أحرف على الأقل.",tr:"Şifre: en az 8 karakter.",pt:"Senha: mínimo 8 caracteres.",en:"Password: at least 8 characters."}); render(); return; }
  if(p1!==p2){ state.authMsg=ml(AUTH.mismatch); render(); return; }
  state.authBusy=true; state.authMsg=''; render();
  try{
    await aw.account.updateRecovery(state.recovery.userId, state.recovery.secret, p1, p1);
    state.recovery=null; state.authBusy=false;
    openAuth('login', ml(AUTH.resetDone));
  }catch(e){ state.authBusy=false; state.authMsg=authErr(e); render(); }
}
function answer(i){
  if(state.selected!==null) return;
  const q=state.session[state.idx];
  const chosen=q._opts[i];
  state.selected=chosen;
  const ok=chosen===q.correctAnswer;
  if(ok) state.score++;
  state.answers.push({q, chosen, ok});
  state.showExpl=true;
  render();
}
function next(){
  if(state.idx+1>=state.session.length){ finish(); return; }
  state.idx++; state.selected=null; state.showExpl=false; render();
}
function finish(){
  clearInterval(state.timer);
  if(window.speechSynthesis) speechSynthesis.cancel();
  recordResult();
  state.view='result'; render();
}
function recordResult(){
  const total=state.session.length; if(!total) return;
  const pct=Math.round(state.score/total*100);
  const s=state.stats;
  s.completedTests+=1;
  s.bestScorePercent=Math.max(s.bestScorePercent,pct);
  s.lastScorePercent=pct;
  s.totalAnswered+=total;
  s.totalCorrect+=state.score;
  saveStats();
}

// ---------- RESULT ----------
function renderResult(){
  const total=state.session.length;
  const pct=Math.round(state.score/total*100);
  const passed=pct>=80;
  const wrong=state.answers.filter(a=>!a.ok);
  app.innerHTML = langBar() + `<div class="wrap">
    <div class="result">
      <div class="rscore gold serif">${pct}%</div>
      <div class="rverdict ${passed?'pass':'fail'}">${passed?'✅ '+esc(t('passed')):'❌ '+esc(t('failed'))}</div>
      <div class="rsub">${esc(t('passInfo'))}</div>
      <div class="rstats">
        <div class="rstat"><div class="n" style="color:var(--green)">${state.score}</div><div class="l">${esc(t('good_n'))}</div></div>
        <div class="rstat"><div class="n" style="color:var(--red)">${wrong.length}</div><div class="l">${esc(t('bad_n'))}</div></div>
        <div class="rstat"><div class="n">${total}</div><div class="l">${esc(t('total_n'))}</div></div>
      </div>
    </div>
    ${wrong.length?`<div class="review-h">${esc(t('review'))}</div>`+wrong.map(a=>`
      <div class="rev">
        <div class="rq">${esc(a.q.question)}</div>
        <div class="ra no">✗ ${esc(t('yourAns'))}: ${esc(optText(a.q,a.chosen))}</div>
        <div class="ra ok">✓ ${esc(t('goodAns'))}: ${esc(optText(a.q,a.q.correctAnswer))}</div>
      </div>`).join(''):''}
    <div class="review-h" style="margin-top:22px">${esc(t('myProgress'))}</div>
    <div class="rstats">
      <div class="rstat"><div class="n gold">${state.stats.bestScorePercent}%</div><div class="l">${esc(t('best'))}</div></div>
      <div class="rstat"><div class="n">${avgPercent()}%</div><div class="l">${esc(t('average'))}</div></div>
      <div class="rstat"><div class="n">${state.stats.completedTests}</div><div class="l">${esc(t('tests'))}</div></div>
    </div>
    <button class="btn-primary" style="margin-top:14px" onclick="startQuiz('${state.mode}')">${esc(t('retry'))}</button>
    <button class="ghost" onclick="goHome()">${esc(t('home'))}</button>
    <div style="height:40px"></div>
  </div>`;
}
function goHome(){ clearInterval(state.timer); if(window.speechSynthesis)speechSynthesis.cancel(); state.view='home'; render(); }

// ---------- LEARNING (réservé aux abonnés) ----------
function openLearning(){ if(!state.fullAccess){ openPaywall(); return; } state.view='learnList'; render(); }
function renderLearnList(){
  app.innerHTML = langBar() + `<div class="wrap">
    <div class="hero" style="padding:20px 0 6px">
      <h1 class="serif gold" style="font-size:30px">📖 ${esc(ml(MODES.learning.title))}</h1>
      <p>${esc(ml(MODES.learning.sub))}</p>
    </div>
    <div style="padding:18px 0 40px">
      ${D.learning.map((tp,i)=>`
        <button class="topic" onclick="openTopic(${i})">
          <span><span class="tt">${esc(ml(tp.title))}</span><br><span class="ts">${esc(ml(tp.subtitle))}</span></span>
          <span class="arr">→</span>
        </button>`).join('')}
      <button class="ghost" onclick="goHome()">${esc(t('home'))}</button>
    </div>
  </div>`;
}
function openTopic(i){ if(!state.fullAccess){ openPaywall(); return; } state.topic=i; state.view='learnTopic'; render(); }
function renderLearnTopic(){
  const tp=D.learning[state.topic];
  app.innerHTML = `<button class="backlink" onclick="openLearning()">← ${esc(t('back'))}</button>
  <div class="wrap">
    <div class="hero" style="padding:6px 0 14px;text-align:left">
      <h1 class="serif gold" style="font-size:28px">${esc(ml(tp.title))}</h1>
      <p style="margin:6px 0 0">${esc(ml(tp.subtitle))}</p>
    </div>
    <div style="padding-bottom:50px">
      ${tp.sections.map((s,i)=>`
        <div class="section">
          <div class="sh">
            <div class="st" ${state.lang==='ar'?'dir="rtl"':''}>${esc(ml(s.title))}</div>
            <button class="speak" onclick="ttsSection(${i}, this)">🔊</button>
          </div>
          <div class="sx" ${state.lang==='ar'?'dir="rtl"':''}>${esc(ml(s.text))}</div>
        </div>`).join('')}
    </div>
  </div>`;
}

// boot
(async function init(){
  state.fullAccess = loadAccess();
  state.lang = loadLang();
  state.stats = loadStats();
  const params = new URLSearchParams(location.search);
  if(params.get('paid')==='1'){ grantAccess(); history.replaceState({}, '', location.pathname); }
  state.view = 'intro';
  render();
  // Appwrite : lien email (vérification OU réinitialisation) + session + statut
  if(awInit()){
    const uid=params.get('userId'), secret=params.get('secret');
    if(uid && secret && params.get('recovery')){
      // lien de réinitialisation du mot de passe → écran "nouveau mot de passe"
      state.recovery={userId:uid, secret:secret};
      history.replaceState({}, '', location.pathname);
      state.view='reset'; render();
      return;
    }
    if(uid && secret){
      // lien de confirmation de l'email
      try{ await aw.account.updateVerification(uid, secret); showFlash(ml(AUTH.verified)); }catch(e){}
      history.replaceState({}, '', location.pathname);
    }
    try{ await awLoadUser(); }catch(e){}
    render();
  }
})();
</script>
